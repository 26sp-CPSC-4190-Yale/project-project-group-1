services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: unplugged
      POSTGRES_PASSWORD: unplugged
      POSTGRES_DB: unplugged
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: unplugged
      DB_PASSWORD: unplugged
      DB_NAME: unplugged
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
